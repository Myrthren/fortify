# Root Netlify config — points Netlify at the web/ subdirectory.
# Set "Base directory" to `web` in Netlify UI, OR rely on this file.

[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
